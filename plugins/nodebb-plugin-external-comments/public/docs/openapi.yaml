openapi: 3.0.3
info:
  title: External Comments Plugin API
  version: 0.2.0
  description: API endpoints exposed by nodebb-plugin-external-comments.
servers:
  - url: /
tags:
  - name: comments
    description: External comments bridge
  - name: users
    description: Keycloak to NodeBB user sync
paths:
  /comments/{externalId}:
    get:
      operationId: getCommentTopicByExternalId
      tags: [comments]
      summary: Resolve topic by externalId
      description: Returns whether a topic mapping exists and, if present, its tid and slug.
      parameters:
        - in: path
          name: externalId
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 255
      responses:
        '200':
          description: Mapping resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLookupResponse'
              examples:
                exists:
                  value:
                    exists: true
                    tid: 123
                    slug: 123/example-topic
        '404':
          description: Mapping not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLookupResponse'
              examples:
                missing:
                  value:
                    exists: false
                    tid: null
                    slug: null
        '400':
          description: Validation/processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Authentication required

  /comments/{externalId}/comment:
    post:
      operationId: createCommentByExternalId
      tags: [comments]
      summary: Create comment for externalId
      description: |
        Requires authenticated NodeBB user session and CSRF token.
        Topic is auto-created by configured serviceUid when mapping is missing.
      parameters:
        - in: path
          name: externalId
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 255
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreateRequest'
      responses:
        '200':
          description: Reply created (NodeBB API envelope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEnvelope'
        '400':
          description: Validation/processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '401':
          description: Authentication required
        '403':
          description: CSRF failure or insufficient permissions

  /user/sync:
    post:
      operationId: syncUserFromKeycloakEvent
      tags: [users]
      summary: Process Keycloak user webhook event
      description: |
        Validates `x-keycloak-signature` using HMAC-SHA256 over raw JSON body.
        Accepted signature encodings: hex or base64.
      parameters:
        - in: header
          name: x-keycloak-signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event processed (NodeBB API envelope)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSyncEnvelope'
              examples:
                created-user:
                  value:
                    status:
                      code: ok
                      message: OK
                    response:
                      handled: true
                      syncResult:
                        handled: true
                        action: created-user
                        keycloakUserId: e2f1b3f7-2bc1-4e7a-9f42-5d9f9e1d7f1a
                        uid: 45
                ignored:
                  value:
                    status:
                      code: ok
                      message: OK
                    response:
                      handled: false
                      syncResult:
                        handled: false
                        reason: ignored-event-type
        '400':
          description: Signature/config/validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'

components:
  schemas:
    CommentLookupResponse:
      type: object
      required: [exists, tid, slug]
      properties:
        exists:
          type: boolean
        tid:
          type: integer
          nullable: true
        slug:
          type: string
          nullable: true

    CommentCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        toPid:
          type: integer
          minimum: 1

    ApiStatus:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      additionalProperties: true

    ApiSuccessEnvelope:
      type: object
      required: [status, response]
      properties:
        status:
          $ref: '#/components/schemas/ApiStatus'
        response:
          type: object
          additionalProperties: true

    ApiErrorEnvelope:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ApiStatus'
        response:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: string

    UserSyncEnvelope:
      type: object
      required: [status, response]
      properties:
        status:
          $ref: '#/components/schemas/ApiStatus'
        response:
          type: object
          required: [handled, syncResult]
          properties:
            handled:
              type: boolean
            syncResult:
              type: object
              additionalProperties: true
