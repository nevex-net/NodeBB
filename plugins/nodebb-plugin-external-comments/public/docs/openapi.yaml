openapi: 3.0.3
info:
  title: External Comments Plugin API
  version: 0.1.0
  description: API endpoints exposed by nodebb-plugin-external-comments.
servers:
  - url: /
tags:
  - name: comments
    description: External comments bridge
paths:
  /api/comments/{externalId}:
    get:
      tags: [comments]
      summary: Check whether topic exists for externalId
      parameters:
        - in: path
          name: externalId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Existence check
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  tid:
                    type: integer
                    nullable: true
  /api/comments/{externalId}/comments:
    get:
      tags: [comments]
      summary: Get comments list for externalId
      parameters:
        - in: path
          name: externalId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Topic/comments payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  exists:
                    type: boolean
                  tid:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  topic:
                    type: object
                    nullable: true
                  posts:
                    type: array
                    items:
                      type: object
        '403':
          description: No privileges to read topic
  /api/comments/{externalId}/comment:
    post:
      tags: [comments]
      summary: Create comment for externalId
      description: |
        Requires logged-in NodeBB user session and CSRF header.
        Topic is auto-created by serviceUid when missing.
      parameters:
        - in: path
          name: externalId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tid:
                    type: integer
                  post:
                    type: object
        '202':
          description: Queued by NodeBB anti-spam/mod queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  tid:
                    type: integer
                  queued:
                    type: boolean
        '400':
          description: Validation or processing error
components: {}
