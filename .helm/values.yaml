replicaCount: 1

image:
  repository: ghcr.io/nevex-net/nodebb
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "4.x"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  fsGroupChangePolicy: "OnRootMismatch"

securityContext:
  runAsUser: 1001
  runAsGroup: 1001
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 4567

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
  - host: ""
    paths:
    - path: /
      pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

nodebb:
  singleMode: true
  admin:
    username: "admin"
    email: "test@example.org"
    password: "admin"

  defaultPlugins: []

  configYaml:
    bcrypt_rounds: 12
    secret: nodebb
    #base_url: ""
    asset_base_url: "/assets"
  persistence:
    # Enables the persistence for node_modules, app build and public uploads
    enabled: true
    existingClaim: ""
    storageClass: ""
    accessModes: ["ReadWriteOnce"]
    size: 8Gi
    annotations: {}
    labels: {}
    selector: {}
  # Select the database for content store, valid options: "redis", "mongo" (recommended) and "postgres"
  database: mongo
  # Select the database for session store, valid options: "" (use database as session store by default), "redis" (recommended), "mongo" and "postgres".
  #
  sessionStore: ""
  domain: localhost
  tls: false

global:
  database:
    managed: false
  redis:
    managed: false
  mongodb:
    managed: false
  postgresql:
    managed: false

redis:
  architecture: replication
  auth:
    enabled: false
    host: ""
    port: 6379
    password: ""
    database: 0

postgresql:
  architecture: replication
  auth:
    host: ""
    port: 5432
    username: 'nodebb'
    password: 'b47017816776912355883f8ea35c09dcb795e7df' # SHA1('nodebb')
    database: 'nodebb'

mongodb:
  # TODO: replicaset architecture is untested
  architecture: replicaset
  auth:
    host: ""
    port: 27017
    username: 'nodebb'
    password: 'b47017816776912355883f8ea35c09dcb795e7df'
    database: 'nodebb'

env: []
#- name: NPM_CONFIG_REGISTRY
#  value: http://npm-verdaccio:4873/
